<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itamar Lider Shiri</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0b;
}

body{
  margin:0;
  background:var(--bg);
  color:white;
  font-family:Inter,sans-serif;
  overflow-x:hidden;
  scroll-snap-type:y mandatory;
}

/* ===== DESKTOP ===== */

.desktop{
  display:block;
}

.section{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
  overflow:hidden;
}

.section iframe{
  position:absolute;
  width:100%;
  height:100%;
  border:0;
  top:0;
  left:0;
}

.overlay{
  position:absolute;
  top:40px;
  left:40px;
  z-index:2;
}

.name{
  font-size:46px;
  font-weight:700;
}

.title{
  font-size:11px;
  letter-spacing:0.2em;
  opacity:.7;
}

.section-title{
  position:absolute;
  bottom:40px;
  left:40px;
  font-size:11px;
  letter-spacing:0.25em;
  opacity:.7;
  z-index:2;
}

.sound-toggle{
  position:fixed;
  bottom:30px;
  right:30px;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  font-size:11px;
  letter-spacing:0.15em;
  cursor:pointer;
  z-index:10;
}

/* ===== MOBILE ===== */

.mobile{
  display:none;
}

@media (max-width:768px){

  body{
    scroll-snap-type:none;
  }

  .desktop{
    display:none;
  }

  .mobile{
    display:block;
    padding:100px 20px;
  }

  .mobile-name{
    font-size:28px;
    font-weight:700;
  }

  .mobile-title{
    font-size:10px;
    letter-spacing:0.15em;
    opacity:.7;
    margin-bottom:30px;
  }

  .card{
    margin-bottom:28px;
  }

  .thumb{
    width:100%;
    aspect-ratio:16/9;
    border-radius:18px;
    overflow:hidden;
  }

  .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .card-title{
    margin-top:10px;
    font-size:11px;
    letter-spacing:0.2em;
    opacity:.85;
  }
}
</style>
</head>

<body>

<!-- SOUND -->
<button class="sound-toggle" id="soundToggle">Enable sound</button>

<div class="desktop">

<!-- HERO -->
<section class="section" data-platform="youtube">
  <div class="overlay">
    <div class="name">ITAMAR LIDER SHIRI</div>
    <div class="title">Director · Creative · Art Direction</div>
  </div>

  <iframe src="https://www.youtube.com/embed/CcpYvKZ5j7s?autoplay=1&mute=1&loop=1&playlist=CcpYvKZ5j7s&controls=0&modestbranding=1&showinfo=0&rel=0&enablejsapi=1"></iframe>
  <div class="section-title">SEXIT — Eden Golan</div>
</section>

<!-- ZETA -->
<section class="section" data-platform="vimeo">
  <iframe src="https://player.vimeo.com/video/1104863532?autoplay=1&muted=1&loop=1&background=1"></iframe>
  <div class="section-title">Zeta — Commercial</div>
</section>

<!-- PELEPHONE -->
<section class="section" data-platform="vimeo">
  <iframe src="https://player.vimeo.com/video/1085404023?autoplay=1&muted=1&loop=1&background=1"></iframe>
  <div class="section-title">Pelephone</div>
</section>

<!-- NESTLE -->
<section class="section" data-platform="vimeo">
  <iframe src="https://player.vimeo.com/video/1099614957?autoplay=1&muted=1&loop=1&background=1"></iframe>
  <div class="section-title">Nestlé Crunch</div>
</section>

<!-- PAYBOX -->
<section class="section" data-platform="vimeo">
  <iframe src="https://player.vimeo.com/video/1052975419?autoplay=1&muted=1&loop=1&background=1"></iframe>
  <div class="section-title">PayBox</div>
</section>

<!-- TAMI -->
<section class="section" data-platform="vimeo">
  <iframe src="https://player.vimeo.com/video/1068760858?autoplay=1&muted=1&loop=1&background=1"></iframe>
  <div class="section-title">Tami 4</div>
</section>

<!-- AMEX -->
<section class="section" data-platform="vimeo">
  <iframe src="https://player.vimeo.com/video/930153765?autoplay=1&muted=1&loop=1&background=1"></iframe>
  <div class="section-title">American Express</div>
</section>

<!-- ANNA ZAK -->
<section class="section" data-platform="youtube">
  <iframe src="https://www.youtube.com/embed/bcuRKDY0Rz0?autoplay=1&mute=1&loop=1&playlist=bcuRKDY0Rz0&controls=0&modestbranding=1&showinfo=0&rel=0&enablejsapi=1"></iframe>
  <div class="section-title">Anna Zak</div>
</section>

</div>

<!-- MOBILE -->

<div class="mobile">

<div class="mobile-name">ITAMAR LIDER SHIRI</div>
<div class="mobile-title">Director · Creative · Art Direction</div>

<div class="card">
<a href="https://www.youtube.com/watch?v=CcpYvKZ5j7s" target="_blank">
<div class="thumb"><img src="https://img.youtube.com/vi/CcpYvKZ5j7s/maxresdefault.jpg"></div>
<div class="card-title">SEXIT — Eden Golan</div>
</a>
</div>

<div class="card">
<a href="https://vimeo.com/1104863532" target="_blank">
<div class="thumb"><img src="https://vumbnail.com/1104863532.jpg"></div>
<div class="card-title">Zeta — Commercial</div>
</a>
</div>

<div class="card">
<a href="https://vimeo.com/1068760858" target="_blank">
<div class="thumb"><img src="https://vumbnail.com/1068760858.jpg"></div>
<div class="card-title">Tami 4</div>
</a>
</div>

</div>

<script>
const sections = document.querySelectorAll('.section');
let active = null;
let soundOn = false;

function muteAll(){
  sections.forEach(sec=>{
    const iframe = sec.querySelector("iframe");
    iframe.contentWindow.postMessage(JSON.stringify({
      event:"command",
      func:"mute"
    }),"*");

    iframe.contentWindow.postMessage({method:"setVolume",value:0},"*");
  });
}

function unmute(sec){
  const iframe = sec.querySelector("iframe");

  iframe.contentWindow.postMessage(JSON.stringify({
    event:"command",
    func:"unMute"
  }),"*");

  iframe.contentWindow.postMessage({method:"setVolume",value:1},"*");
}

const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      active = entry.target;

      muteAll();

      if(soundOn){
        unmute(active);
      }
    }
  });
},{threshold:0.6});

sections.forEach(sec=>observer.observe(sec));

document.getElementById("soundToggle").onclick=()=>{
  soundOn = !soundOn;

  if(soundOn){
    unmute(active);
    soundToggle.innerText="Sound on";
  }else{
    muteAll();
    soundToggle.innerText="Enable sound";
  }
};
</script>

</body>
</html>
