<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Inter,sans-serif;
  overflow-x:hidden;
  scroll-snap-type:y mandatory;
}

.section{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
  overflow:hidden;
}

.section iframe{
  position:absolute;
  width:100%;
  height:100%;
  border:0;
}

.overlay{
  position:absolute;
  top:40px;
  left:40px;
  z-index:2;
}

.name{
  font-size:46px;
  font-weight:700;
}

.title{
  font-size:11px;
  letter-spacing:.2em;
  opacity:.7;
}

.section-title{
  position:absolute;
  bottom:40px;
  left:40px;
  font-size:11px;
  letter-spacing:.25em;
  opacity:.7;
  z-index:2;
}

.sound-toggle{
  position:fixed;
  bottom:30px;
  right:30px;
  padding:10px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  font-size:11px;
  letter-spacing:.15em;
  cursor:pointer;
  z-index:10;
}

/* MOBILE */
.mobile{display:none;}

@media(max-width:768px){
  body{scroll-snap-type:none;}
  .section{display:none;}

  .mobile{
    display:block;
    padding:100px 20px;
  }

  .mobile-name{
    font-size:28px;
    font-weight:700;
  }

  .mobile-title{
    font-size:10px;
    letter-spacing:.15em;
    opacity:.7;
    margin-bottom:30px;
  }

  .card{margin-bottom:28px;}

  .thumb{
    aspect-ratio:16/9;
    border-radius:18px;
    overflow:hidden;
  }

  .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .card-title{
    margin-top:10px;
    font-size:11px;
    letter-spacing:.2em;
  }
}
</style>
</head>

<div class="section-title">Go To Sleep</div>
</section>

<script>
const sections=document.querySelectorAll('.section');
let active=null;
let soundOn=false;

function muteAll(){
sections.forEach(sec=>{
const iframe=sec.querySelector("iframe");
iframe.contentWindow.postMessage(JSON.stringify({event:"command",func:"mute"}),"*");
iframe.contentWindow.postMessage({method:"setVolume",value:0},"*");
});
}

function unmute(sec){
const iframe=sec.querySelector("iframe");
iframe.contentWindow.postMessage(JSON.stringify({event:"command",func:"unMute"}),"*");
iframe.contentWindow.postMessage({method:"setVolume",value:1},"*");
}

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
active=entry.target;
muteAll();
if(soundOn)unmute(active);
}
});
},{threshold:0.6});

sections.forEach(sec=>observer.observe(sec));

soundToggle.onclick=()=>{
soundOn=!soundOn;
if(soundOn){unmute(active);soundToggle.innerText="Sound on";}
else{muteAll();soundToggle.innerText="Enable sound";}
};
</script>
